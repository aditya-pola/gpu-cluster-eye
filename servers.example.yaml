# GPU-Eye Server Configuration
# Copy to servers.yaml and fill in your server details
# The 'name' field is what displays in the UI - use the IP/hostname

servers:
  - name: 192.168.1.10
    host: 192.168.1.10
    user: admin
    key_file: ~/.ssh/id_rsa

  - name: 192.168.1.11
    host: 192.168.1.11
    user: admin
    key_file: ~/.ssh/id_rsa

  # Add more servers as needed
